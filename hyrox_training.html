<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYROX DC — 14-Week Training Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --white: #f5f2ec;
    --orange: #e8501a;
    --orange-dim: #c44015;
    --amber: #f0a500;
    --teal: #1a9e75;
    --blue: #2478c8;
    --gray: #6b6b6b;
    --gray-light: #e2dfd8;
    --card-bg: #161616;
    --card-border: #2a2a2a;
    --phase-base: #1a9e75;
    --phase-build: #f0a500;
    --phase-peak: #e8501a;
    --phase-taper: #2478c8;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,13,13,0.95);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--card-border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }

  .header-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    color: var(--orange);
    text-transform: uppercase;
  }

  .header-meta {
    font-size: 0.75rem;
    color: var(--gray);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .countdown-chip {
    background: var(--orange);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    padding: 4px 12px;
    border-radius: 2px;
    text-transform: uppercase;
  }

  /* HERO */
  .hero {
    padding: 5rem 2rem 3rem;
    max-width: 900px;
    margin: 0 auto;
    position: relative;
  }

  .hero-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 1rem;
  }

  .hero-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(3.5rem, 8vw, 7rem);
    line-height: 0.9;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 1.5rem;
  }

  .hero-title span { color: var(--orange); }

  .hero-sub {
    font-size: 1rem;
    color: var(--gray);
    max-width: 460px;
    margin-bottom: 2.5rem;
    font-weight: 300;
    line-height: 1.7;
  }

  .hero-stats {
    display: flex;
    gap: 2.5rem;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
  }

  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    line-height: 1;
    color: var(--white);
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 4px;
  }

  .divider-line {
    border: none;
    border-top: 1px solid var(--card-border);
    margin: 3rem auto;
    max-width: 900px;
  }

  /* PHASE NAV */
  .phase-nav {
    max-width: 900px;
    margin: 0 auto 2rem;
    padding: 0 2rem;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .phase-btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 2px;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--gray);
    cursor: pointer;
    transition: all 0.15s;
  }

  .phase-btn:hover { border-color: var(--gray); color: var(--white); }
  .phase-btn.active-base { background: var(--teal); border-color: var(--teal); color: #fff; }
  .phase-btn.active-build { background: var(--amber); border-color: var(--amber); color: #0d0d0d; }
  .phase-btn.active-peak { background: var(--orange); border-color: var(--orange); color: #fff; }
  .phase-btn.active-taper { background: var(--blue); border-color: var(--blue); color: #fff; }
  .phase-btn.active-all { border-color: var(--white); color: var(--white); }

  /* MAIN CONTENT */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 2rem 6rem;
  }

  /* PHASE SECTION */
  .phase-section {
    margin-bottom: 3rem;
  }

  .phase-header-row {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 0.5rem;
  }

  .phase-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 2.2rem;
    text-transform: uppercase;
    line-height: 1;
  }

  .phase-weeks-label {
    font-size: 0.75rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .phase-desc-text {
    font-size: 0.85rem;
    color: var(--gray);
    margin-bottom: 1.25rem;
    max-width: 560px;
    line-height: 1.6;
  }

  /* WEEK CARDS */
  .week-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .week-toggle {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: none;
    border: none;
    color: var(--white);
    cursor: pointer;
    text-align: left;
    transition: background 0.1s;
  }

  .week-toggle:hover { background: rgba(255,255,255,0.03); }

  .week-num-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gray);
    min-width: 60px;
  }

  .week-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 1.05rem;
    letter-spacing: 0.02em;
    flex: 1;
  }

  .week-intensity {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .intensity-easy { background: rgba(26,158,117,0.15); color: var(--teal); }
  .intensity-moderate { background: rgba(240,165,0,0.15); color: var(--amber); }
  .intensity-hard { background: rgba(232,80,26,0.15); color: var(--orange); }
  .intensity-recovery { background: rgba(107,107,107,0.15); color: var(--gray); }
  .intensity-peak { background: rgba(232,80,26,0.2); color: #ff7a50; }
  .intensity-taper { background: rgba(36,120,200,0.15); color: var(--blue); }
  .intensity-raceweek { background: rgba(36,120,200,0.25); color: #5ba8e8; }

  .week-chevron {
    color: var(--gray);
    font-size: 1rem;
    transition: transform 0.25s;
  }

  .week-card.open .week-chevron { transform: rotate(180deg); }

  .week-body {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 1px solid var(--card-border);
  }

  .week-card.open .week-body { display: block; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
    margin-top: 1rem;
  }

  .day-cell {
    background: #1c1c1c;
    border: 1px solid #252525;
    border-radius: 3px;
    padding: 0.75rem;
  }

  .day-cell.rest-cell { background: #111; border-color: #1e1e1e; }

  .day-cell-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 6px;
  }

  .day-cell-name {
    font-weight: 500;
    font-size: 0.85rem;
    color: var(--white);
    margin-bottom: 5px;
    line-height: 1.3;
  }

  .day-cell-detail {
    font-size: 0.78rem;
    color: #888;
    line-height: 1.5;
  }

  /* STATIONS */
  .stations-section {
    margin: 3rem 0;
    padding: 2rem;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
  }

  .stations-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--orange);
    margin-bottom: 1.25rem;
  }

  .stations-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }

  .station-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 0.6rem 0.75rem;
    background: #1c1c1c;
    border-radius: 3px;
    font-size: 0.82rem;
  }

  .station-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--orange);
    line-height: 1;
    min-width: 20px;
  }

  .station-info {}
  .station-name { color: var(--white); font-weight: 500; }
  .station-dist { color: var(--gray); font-size: 0.75rem; }

  /* RACE CARD */
  .race-card {
    background: linear-gradient(135deg, #1a1010 0%, #110d0d 100%);
    border: 1px solid var(--orange-dim);
    border-radius: 4px;
    padding: 2rem;
    margin: 3rem 0;
    position: relative;
    overflow: hidden;
  }

  .race-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--orange);
  }

  .race-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 0.5rem;
  }

  .race-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 2.5rem;
    text-transform: uppercase;
    line-height: 1;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  .race-details {
    font-size: 0.85rem;
    color: var(--gray);
    margin-bottom: 1.5rem;
  }

  .race-cta {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 24px;
    background: var(--orange);
    color: var(--white);
    border-radius: 2px;
    text-decoration: none;
    transition: background 0.15s;
  }

  .race-cta:hover { background: var(--orange-dim); }

  /* TIPS */
  .tips-section {
    margin: 2rem 0;
  }

  .tips-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gray);
    margin-bottom: 1rem;
  }

  .tips-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 8px;
  }

  .tip-item {
    padding: 1rem;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    border-left: 3px solid var(--orange);
  }

  .tip-head { font-weight: 500; font-size: 0.85rem; margin-bottom: 4px; }
  .tip-body { font-size: 0.78rem; color: #888; line-height: 1.5; }

  /* CURRENT WEEK HIGHLIGHT */
  .current-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--orange);
    color: white;
    padding: 2px 8px;
    border-radius: 2px;
    margin-left: 6px;
  }

  /* FILTER */
  .filter-bar {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    max-width: 900px;
    margin: 0 auto 1.5rem;
    padding: 0 2rem;
  }

  .filter-label {
    font-size: 0.72rem;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 4px;
  }

  @media (max-width: 600px) {
    .hero-title { font-size: 3rem; }
    .hero-stats { gap: 1.5rem; }
    .days-grid { grid-template-columns: 1fr 1fr; }
    header { padding: 0 1rem; }
    .hero, .main, .filter-bar, .phase-nav { padding-left: 1rem; padding-right: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">HYROX Training</div>
  <div class="countdown-chip" id="countdown-chip">Loading...</div>
</header>

<div class="hero">
  <div class="hero-eyebrow">Your 14-Week Plan</div>
  <h1 class="hero-title">Train.<br><span>Race.</span><br>Finish.</h1>
  <p class="hero-sub">Washington D.C. · September 3–7, 2026 · Walter E. Washington Convention Center</p>
  <div class="hero-stats">
    <div class="stat">
      <span class="stat-num">14</span>
      <span class="stat-label">Weeks</span>
    </div>
    <div class="stat">
      <span class="stat-num">4</span>
      <span class="stat-label">Days/week</span>
    </div>
    <div class="stat">
      <span class="stat-num">8km</span>
      <span class="stat-label">Total run</span>
    </div>
    <div class="stat">
      <span class="stat-num">8</span>
      <span class="stat-label">Stations</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="days-out">—</span>
      <span class="stat-label">Days to race</span>
    </div>
  </div>
</div>

<hr class="divider-line">

<div class="filter-bar">
  <span class="filter-label">Jump to:</span>
  <button class="phase-btn" onclick="filterPhase('all')">All phases</button>
  <button class="phase-btn" onclick="filterPhase('base')">Base</button>
  <button class="phase-btn" onclick="filterPhase('build')">Build</button>
  <button class="phase-btn" onclick="filterPhase('peak')">Peak</button>
  <button class="phase-btn" onclick="filterPhase('taper')">Taper</button>
</div>

<main class="main" id="main-content"></main>

<script>
const RACE_DATE = new Date('2026-09-03T08:00:00');

// Training start = 14 weeks before Sep 3 = June 4, 2026
const TRAINING_START = new Date('2026-06-04');

function getCurrentWeek() {
  const now = new Date();
  const diff = now - TRAINING_START;
  const weekNum = Math.floor(diff / (7 * 24 * 60 * 60 * 1000)) + 1;
  return weekNum >= 1 && weekNum <= 14 ? weekNum : null;
}

function daysUntilRace() {
  const now = new Date();
  const diff = RACE_DATE - now;
  return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
}

document.getElementById('days-out').textContent = daysUntilRace();

const d = daysUntilRace();
document.getElementById('countdown-chip').textContent = d > 0 ? d + ' days to race' : 'Race week!';

const phases = [
  {
    id: 'base',
    label: 'Base',
    color: '#1a9e75',
    weeksLabel: 'Weeks 1–4',
    desc: 'Build aerobic base and movement patterns. Low intensity, high frequency. Get comfortable running alongside station movements.',
    weeks: [
      {
        num: 1, title: 'Orientation', intensity: 'easy', intLabel: 'Easy',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Endurance class. Stay in green/orange zones. Note splat points.' },
          { label: 'Tue', name: 'Station intro', detail: 'Gym: 3×5min ski erg + 3×5min row. Easy pace, focus on form.' },
          { label: 'Wed', name: 'Rest / walk', detail: '20–30 min easy walk or full rest.' },
          { label: 'Thu', name: 'Strength (home)', detail: '3×12 goblet squat, 3×10 RDL, 3×15 wall ball, 3×10 plank row.' },
          { label: 'Fri–Sun', name: 'Rest', detail: 'Full rest. Sleep 7–8 hrs. Prioritize recovery.', rest: true }
        ]
      },
      {
        num: 2, title: 'Aerobic steady state', intensity: 'easy', intLabel: 'Easy',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Endurance Day class if available. Aim 14–18 splat points.' },
          { label: 'Tue', name: 'Running drills', detail: 'Gym: 4×800m at conversational pace with 90s rest.' },
          { label: 'Wed', name: 'Active recovery', detail: '20 min yoga or mobility. Hip flexors, hamstrings, shoulders.' },
          { label: 'Thu', name: 'Strength + stations', detail: '3×15 wall ball, 3×12 sandbag lunge, 3×10 farmer carry. Add 2×200m run between sets.' }
        ]
      },
      {
        num: 3, title: 'Volume increase', intensity: 'moderate', intLabel: 'Moderate',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Power Day. Push hard on intervals. Target 18–20 splat points.' },
          { label: 'Tue', name: 'Run + row combo', detail: '2km run, 500m row, 2km run, 500m row. Rest 2 min between efforts.' },
          { label: 'Wed', name: 'Rest / stretch', detail: 'Full rest or 15 min stretch routine.', rest: true },
          { label: 'Thu', name: 'Full station circuit', detail: '1km run → ski erg 500m → 1km run → row 500m → 1km run → wall balls 30 reps. ×2 rounds.' }
        ]
      },
      {
        num: 4, title: 'Deload', intensity: 'recovery', intLabel: 'Recovery',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Take a lower-intensity class. Don\'t push splat points.' },
          { label: 'Tue', name: 'Easy run', detail: '20 min easy jog. No intervals. Just move.' },
          { label: 'Wed', name: 'Rest', detail: 'Full rest.', rest: true },
          { label: 'Thu', name: 'Light mobility', detail: '30 min yoga or foam rolling. No strength work.' }
        ]
      }
    ]
  },
  {
    id: 'build',
    label: 'Build',
    color: '#f0a500',
    weeksLabel: 'Weeks 5–10',
    desc: 'Increase intensity and volume. Introduce back-to-back station + run sequences (roxzones). This is where race fitness is built.',
    weeks: [
      {
        num: 5, title: 'Introduce roxzones', intensity: 'moderate', intLabel: 'Moderate',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Power Day. Push hard. 18–20 splat points target.' },
          { label: 'Tue', name: 'Roxzone simulation', detail: 'Gym: 1km run → ski erg 500m → 1km run → row 500m → 1km run. Rest 3 min, repeat.' },
          { label: 'Wed', name: 'Active recovery', detail: 'Yoga or 30 min walk. Keep HR below 120.' },
          { label: 'Thu', name: 'Strength endurance', detail: '4×12 sled push/pull (sub DB lunges if needed), 4×15 wall ball, 3×20 farmer carry steps.' }
        ]
      },
      {
        num: 6, title: 'Volume + pace', intensity: 'moderate', intLabel: 'Moderate+',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Endurance Day. Sustain orange zone for long blocks.' },
          { label: 'Tue', name: '4×1km intervals', detail: 'Gym treadmill: 4×1km at 5k race effort with 90s walk rest.' },
          { label: 'Wed', name: 'Rest / mobility', detail: 'Full rest or hip/shoulder mobility routine.', rest: true },
          { label: 'Thu', name: 'HYROX circuit', detail: '1km run → 80m burpee broad jumps → 1km run → 30 wall balls → 1km run → farmers carry 2×30m. ×2.' }
        ]
      },
      {
        num: 7, title: 'Race pace work', intensity: 'hard', intLabel: 'Hard',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Power Day. Match push/all-out intensity to HYROX pace.' },
          { label: 'Tue', name: 'Half roxzone', detail: '4 rounds of: 1km run + 1 HYROX station (rotate stations each week). Rest 2 min.' },
          { label: 'Wed', name: 'Active recovery', detail: 'Easy walk or yoga. Keep it genuinely easy today.' },
          { label: 'Thu', name: 'Strength + speed', detail: 'Back squat 3×8, RDL 3×10, then 20 min AMRAP: 5 wall balls + 50m farmers carry + 200m run.' }
        ]
      },
      {
        num: 8, title: 'Deload', intensity: 'recovery', intLabel: 'Recovery',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Easy class. No pressure on splat points.' },
          { label: 'Tue', name: 'Easy stations', detail: '30 min: 5 min ski erg, 5 min row, 5 min wall balls, easy pace.' },
          { label: 'Wed', name: 'Rest', detail: 'Full rest.', rest: true },
          { label: 'Thu', name: 'Mobility + light run', detail: '20 min jog + 15 min full-body stretch.' }
        ]
      },
      {
        num: 9, title: 'Longer roxzones', intensity: 'hard', intLabel: 'Hard',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Marathon Day if available — longest sustained effort.' },
          { label: 'Tue', name: '6-station sim', detail: '1km run → ski erg → 1km run → row → 1km run → wall balls → 1km run → burpee jumps → 1km run → farmers carry → 1km run. Rest 5 min, repeat ×1.' },
          { label: 'Wed', name: 'Rest / walk', detail: 'Easy 30 min walk or full rest.', rest: true },
          { label: 'Thu', name: 'Strength tempo', detail: 'Lighter loads, higher reps. 4×20 wall ball, 4×15 sandbag lunge, 3×400m run at tempo.' }
        ]
      },
      {
        num: 10, title: 'Full simulation', intensity: 'hard', intLabel: 'Hard',
        days: [
          { label: 'Mon', name: 'Orangetheory', detail: 'Power Day. Treat this like a race rehearsal for intensity.' },
          { label: 'Tue', name: 'Full HYROX mock', detail: '8×(1km run + 1 station). Use gym: sub sled with DB carry/step lunges. Race pace effort.' },
          { label: 'Wed', name: 'Active recovery', detail: 'Yoga, foam rolling, extra sleep. You need it after Tuesday.' },
          { label: 'Thu', name: 'Easy strength', detail: 'Light circuit: 3×10 goblet squat, 3×10 RDL, 3×10 row. No grinding.' }
        ]
      }
    ]
  },
  {
    id: 'peak',
    label: 'Peak',
    color: '#e8501a',
    weeksLabel: 'Weeks 11–12',

const stations = [
  { num: 1, name: 'SkiErg', dist: '1,000m' },
  { num: 2, name: 'Sled push', dist: '50m' },
  { num: 3, name: 'Sled pull', dist: '50m' },
  { num: 4, name: 'Burpee broad jumps', dist: '80m' },
  { num: 5, name: 'Rowing', dist: '1,000m' },
  { num: 6, name: 'Farmers carry', dist: '200m' },
  { num: 7, name: 'Sandbag lunges', dist: '100m' },
  { num: 8, name: 'Wall balls', dist: '75–100 reps' }
];

const tips = [
  { head: 'Register now', body: 'HYROX D.C. sells out. Lock in your spot at hyrox.com before starting week 1.' },
  { head: 'OTF is your cardio engine', body: 'Treat Power Day push/all-out blocks as your roxzone rehearsal.' },
  { head: 'Priority stations', body: 'Wall balls and burpee broad jumps lose the most time. Build them into every Thursday.' },
  { head: 'Protein target', body: 'Aim for 0.7–1g per lb of bodyweight daily to support fat loss and recovery.' },
  { head: 'Sleep is training', body: '7–8 hrs directly impacts fat loss and stress hormones. Non-negotiable.' },
  { head: 'Know your 1km pace', body: 'Find a pace you can hold for all 8 runs and stick to it. Going out too fast costs big.' }
];

const currentWeek = getCurrentWeek();
const main = document.getElementById('main-content');

// Build HTML
let html = '';

phases.forEach(phase => {
  html += `<section class="phase-section" data-phase="${phase.id}">`;
  html += `<div class="phase-header-row">
    <span class="phase-label" style="color:${phase.color}">${phase.label}</span>
    <span class="phase-weeks-label">${phase.weeksLabel}</span>
  </div>`;
  html += `<p class="phase-desc-text">${phase.desc}</p>`;

  phase.weeks.forEach(week => {
    const isCurrent = week.num === currentWeek;
    html += `<div class="week-card${isCurrent ? ' open' : ''}" id="week-${week.num}">
      <button class="week-toggle" onclick="toggleWeek(this)">
        <span class="week-num-badge">Week ${week.num}</span>
        <span class="week-title">${week.title}${isCurrent ? '<span class="current-badge">Current</span>' : ''}</span>
        <span class="week-intensity intensity-${week.intensity}">${week.intLabel}</span>
        <span class="week-chevron">▾</span>
      </button>
      <div class="week-body">
        <div class="days-grid">`;

    week.days.forEach(day => {
      html += `<div class="day-cell${day.rest ? ' rest-cell' : ''}">
        <div class="day-cell-label">${day.label}</div>
        <div class="day-cell-name">${day.name}</div>
        <div class="day-cell-detail">${day.detail}</div>
      </div>`;
    });

    html += `</div></div></div>`;
  });

  html += `</section>`;
});

// Stations
html += `<div class="stations-section">
  <div class="stations-title">The 8 HYROX stations · 1km run between each</div>
  <div class="stations-grid">`;
stations.forEach(s => {
  html += `<div class="station-item">
    <span class="station-num">${s.num}</span>
    <div class="station-info">
      <div class="station-name">${s.name}</div>
      <div class="station-dist">${s.dist}</div>
    </div>
  </div>`;
});
html += `</div></div>`;

// Race card
html += `<div class="race-card">
  <div class="race-eyebrow">Target event</div>
  <div class="race-title">HYROX Washington D.C.</div>
  <div class="race-details">September 3–7, 2026 &nbsp;·&nbsp; Walter E. Washington Convention Center</div>
  <a href="https://hyrox.com" target="_blank" class="race-cta">Register at hyrox.com ↗</a>
</div>`;

// Tips
html += `<div class="tips-section">
  <div class="tips-title">Key reminders</div>
  <div class="tips-grid">`;
tips.forEach(t => {
  html += `<div class="tip-item">
    <div class="tip-head">${t.head}</div>
    <div class="tip-body">${t.body}</div>
  </div>`;
});
html += `</div></div>`;

main.innerHTML = html;

// Auto scroll to current week
if (currentWeek) {
  setTimeout(() => {
    const el = document.getElementById('week-' + currentWeek);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 300);
}

function toggleWeek(btn) {
  btn.closest('.week-card').classList.toggle('open');
}

function filterPhase(phase) {
  const sections = document.querySelectorAll('.phase-section');
  sections.forEach(s => {
    s.style.display = (phase === 'all' || s.dataset.phase === phase) ? 'block' : 'none';
  });
  // scroll to first visible
  const first = document.querySelector(`.phase-section[data-phase="${phase}"]`);
  if (first && phase !== 'all') first.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
